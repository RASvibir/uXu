<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>uXu: CyberCat Sunflower Archive</title>
    <style>
        body { background: #0a0a0c; color: #00ff88; font-family: monospace; padding: 20px; }
        header { border-bottom: 2px dashed #00ff88; padding-bottom: 20px; margin-bottom: 20px; }
        .show-card { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .show-card:hover { border-color: #00ff88; }
        button { background: #00ff88; color: #000; border: none; padding: 8px 12px; cursor: pointer; font-family: monospace; font-weight: bold; }
        button:hover { background: #fff; }
        .eq-container { background: #141416; border: 2px solid #00ff88; padding: 15px; margin-top: 20px; border-radius: 6px; width: fit-content; display: inline-block; }
        .sliders { display: flex; gap: 25px; margin-top: 10px; }
        .slider-control { text-align: center; }
        .slider-control input { writing-mode: vertical-lr; direction: rtl; width: 15px; height: 100px; accent-color: #00ff88; }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <h1 id="arch-name">🌻 UXU ARCHIVE SYSTEM</h1>
        <p id="arch-desc">Loading core matrix...</p>
    </header>

    <main>
        <h3>🎧 AUDIO CONSOLE & ENGINE</h3>
        <audio id="main-player" controls crossorigin="anonymous"></audio>
        
        <div class="eq-container">
            <strong style="letter-spacing: 1px; font-size:12px;">🎛️ CYBER-EQ CORE v0.1</strong>
            <div class="sliders">
                <div class="slider-control">
                    <label style="display:block; font-size:10px;">BASS</label>
                    <input type="range" id="eq-bass" min="-12" max="12" value="0" step="1">
                    <span id="val-bass" style="display:block; font-size:10px; margin-top:4px;">0dB</span>
                </div>
                <div class="slider-control">
                    <label style="display:block; font-size:10px;">MID</label>
                    <input type="range" id="eq-mid" min="-12" max="12" value="0" step="1">
                    <span id="val-mid" style="display:block; font-size:10px; margin-top:4px;">0dB</span>
                </div>
                <div class="slider-control">
                    <label style="display:block; font-size:10px;">TREBLE</label>
                    <input type="range" id="eq-treble" min="-12" max="12" value="0" step="1">
                    <span id="val-treble" style="display:block; font-size:10px; margin-top:4px;">0dB</span>
                </div>
            </div>
        </div>

        <h3 style="margin-top:30px;">📂 PRESERVED DATA LOGS</h3>
        <div id="shows-list"></div>
    </main>

    <script>
        const player = document.getElementById('main-player');
        let audioCtx, bassNode, midNode, trebleNode, initialized = false;

        function initAudioEngine() {
            if (initialized) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(player);

            bassNode = audioCtx.createBiquadFilter();
            bassNode.type = 'lowshelf';
            bassNode.frequency.setValueAtTime(200, audioCtx.currentTime);

            midNode = audioCtx.createBiquadFilter();
            midNode.type = 'peaking';
            midNode.Q.setValueAtTime(1, audioCtx.currentTime);
            midNode.frequency.setValueAtTime(1000, audioCtx.currentTime);

            trebleNode = audioCtx.createBiquadFilter();
            trebleNode.type = 'highshelf';
            trebleNode.frequency.setValueAtTime(3500, audioCtx.currentTime);

            source.connect(bassNode);
            bassNode.connect(midNode);
            midNode.connect(trebleNode);
            trebleNode.connect(audioCtx.destination);

            bindSlider('eq-bass', bassNode, 'val-bass');
            bindSlider('eq-mid', midNode, 'val-mid');
            bindSlider('eq-treble', trebleNode, 'val-treble');
            initialized = true;
        }

        function bindSlider(id, node, valId) {
            const el = document.getElementById(id);
            const valEl = document.getElementById(valId);
            el.addEventListener('input', (e) => {
                node.gain.setValueAtTime(e.target.value, audioCtx.currentTime);
                valEl.textContent = `${e.target.value > 0 ? '+' : ''}${e.target.value}dB`;
            });
        }

        player.addEventListener('play', initAudioEngine);

        fetch('archives/CyberCat-Sunflower/data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('arch-name').textContent = `🌻 ${data.archiveName} (${data.artist})`;
                document.getElementById('arch-desc').textContent = data.description;
                
                const list = document.getElementById('shows-list');
                data.shows.forEach(show => {
                    const card = document.createElement('div');
                    card.className = 'show-card';
                    card.innerHTML = `
                        <h4>📅 ${show.date} - ${show.venue} (${show.city}, ${show.country})</h4>
                        <p><em>${show.notes}</em></p>
                        <p><strong>Setlist:</strong> ${show.setlist.join(', ')}</p>
                        <button onclick="player.src='https://archive.org/download/${show.audioSources[0].archiveOrgId}'; player.play();">⚡ LOAD & PLAY LIVE TAPE</button>
                    `;
                    list.appendChild(card);
                });
            });
    </script>
</body>
</html>
