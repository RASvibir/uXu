<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERCAT - SUNFLOWER MASTER TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');
        
        body {
            background: #050505;
            color: #39ff14;
            font-family: 'Courier Prime', monospace;
            padding: 1.5rem;
            border: 15px solid #ff00ff;
            box-shadow: inset 0 0 50px #ff00ff, 0 0 20px #39ff14;
            min-height: 95vh;
            animation: crt-trip 15s infinite alternate;
            margin: 0;
            overflow-x: hidden;
        }

        @keyframes crt-trip {
            0% { border-color: #ff00ff; box-shadow: inset 0 0 50px #ff00ff, 0 0 15px #39ff14; }
            50% { border-color: #00ffff; box-shadow: inset 0 0 50px #00ffff, 0 0 15px #ff00ff; }
            100% { border-color: #ffff00; box-shadow: inset 0 0 50px #ffff00, 0 0 15px #00ffff; }
        }

        .terminal-header {
            text-align: center;
            border-bottom: 2px dashed #39ff14;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        .terminal-header h1 { text-shadow: 0 0 15px #39ff14; margin: 0; letter-spacing: 3px; font-size: 1.8rem; }

        .main-dashboard {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 1.5rem;
        }

        .panel {
            background: rgba(0, 15, 0, 0.7);
            border: 1px solid #39ff14;
            padding: 1rem;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
        }

        h3 { margin-top: 0; color: #00ffff; text-transform: uppercase; border-bottom: 1px solid #00ffff; padding-bottom: 0.3rem; }

        /* Media Player & Equalizer Elements */
        .player-controls { margin-bottom: 1.5rem; }
        audio { width: 100%; background: #222; border-radius: 0; outline: none; margin-top: 0.5rem; }
        
        .eq-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 120px;
            padding: 10px 0;
            background: #000;
            border: 1px dashed #ff00ff;
        }
        .eq-slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 18%;
        }
        .eq-slider-group input[type=range] {
            writing-mode: vertical-lr;
            direction: rtl;
            appearance: slider-vertical;
            width: 15px;
            height: 80px;
            background: #222;
        }
        .eq-label { font-size: 0.7rem; color: #ff00ff; margin-top: 4px; }

        .song-selector {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .song-selector li {
            cursor: pointer;
            padding: 0.4rem;
            border-bottom: 1px solid #222;
            transition: 0.2s;
        }
        .song-selector li:hover, .song-selector li.active {
            background: #39ff14;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 8px #39ff14;
        }

        /* RuKind Viewer */
        .viewer-pane { position: relative; }
        .transpose-bar {
            margin-bottom: 1rem;
            text-align: right;
        }
        .btn-retro {
            background: #000;
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 0.2rem 0.6rem;
            font-family: inherit;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-retro:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 8px #00ffff;
        }
        
        .tab-meta {
            color: #ffff00;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
            border-bottom: 1px dashed #ffff00;
            padding-bottom: 0.5rem;
        }

        .rendered-lyrics {
            margin-top: 1.5rem;
        }
        .lyric-line {
            display: block;
            margin-top: 1.6rem;
            position: relative;
            line-height: 2.2;
            min-height: 2rem;
        }
        .chord {
            position: absolute;
            top: -1.1rem;
            color: #ff00ff;
            font-weight: bold;
            text-shadow: 0 0 5px #ff00ff;
        }
    </style>
</head>
<body>

    <div class="terminal-header">
        <h1>[ COMPAQ PRESARIO PRESENTS: uXu CYBERCAT-SUNFLOWER ]</h1>
        <div>SYSTEM STATUS: COLD WAR MIXER & TELEMETRY INDEX ONLINE</div>
    </div>

    <div class="main-dashboard">
        <div class="sidebar-deck">
            <div class="panel player-controls">
                <h3>>> DECK_ALPHA</h3>
                <audio id="audio-element" controls crossorigin="anonymous"></audio>
                
                <p style="font-size:0.75rem; color:#ff00ff; margin: 10px 0 5px 0;">5-BAND GRAPHIC EQUALIZER</p>
                <div class="eq-container">
                    <div class="eq-slider-group">
                        <input type="range" id="eq-60" min="-12" max="12" value="0" step="1">
                        <span class="eq-label">60Hz</span>
                    </div>
                    <div class="eq-slider-group">
                        <input type="range" id="eq-230" min="-12" max="12" value="0" step="1">
                        <span class="eq-label">230Hz</span>
                    </div>
                    <div class="eq-slider-group">
                        <input type="range" id="eq-910" min="-12" max="12" value="0" step="1">
                        <span class="eq-label">910Hz</span>
                    </div>
                    <div class="eq-slider-group">
                        <input type="range" id="eq-4k" min="-12" max="12" value="0" step="1">
                        <span class="eq-label">4kHz</span>
                    </div>
                    <div class="eq-slider-group">
                        <input type="range" id="eq-14k" min="-12" max="12" value="0" step="1">
                        <span class="eq-label">14kHz</span>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h3>>> PLAYLIST_INDEX</h3>
                <ul class="song-selector" id="playlist-dom">
                    </ul>
            </div>
        </div>

        <div class="panel viewer-pane">
            <div class="transpose-bar">
                <span style="color:#ffff00; font-size:0.8rem; margin-right:10px;">KEY_TRANSPOSE:</span>
                <button class="btn-retro" onclick="shiftKey(-1)">♭ DOWN</button>
                <button class="btn-retro" onclick="shiftKey(1)">♯ UP</button>
            </div>
            <h3>>> RUKIND_RELATIONAL_TELEMETRY</h3>
            <div id="tab-viewport">Select an index marker to decode matrix...</div>
        </div>
    </div>

    <script>
        let currentRawStructure = [];
        let transposeOffset = 0;
        let songCatalog = {};

        const scaleChords = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        // Equalizer Setup Variables
        let audioCtx = null;
        let filters = [];

        // Dynamic Initialization
        document.addEventListener('DOMContentLoaded', () => {
            setupEqualizerWiring();
            
            // Fetch Relational Lyric/Tab Database
            fetch('song-index.json')
                .then(r => r.json())
                .then(data => {
                    songCatalog = data.songs;
                    populatePlaylist(data.songs);
                });
        });

        function setupEqualizerWiring() {
            const audio = document.getElementById('audio-element');
            
            const initAudioContext = () => {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let source = audioCtx.createMediaElementSource(audio);

                // Define frequencies for 5-band Equalizer
                const frequencies = [60, 230, 910, 4000, 14000];
                
                filters = frequencies.map((freq, index) => {
                    let filter = audioCtx.createBiquadFilter();
                    filter.type = (index === 0) ? 'lowshelf' : (index === frequencies.length - 1) ? 'highshelf' : 'peaking';
                    filter.frequency.value = freq;
                    filter.gain.value = 0;
                    return filter;
                });

                // Link Filters together in chain
                source.connect(filters[0]);
                for (let i = 0; i < filters.length - 1; i++) {
                    filters[i].connect(filters[i+1]);
                }
                filters[filters.length - 1].connect(audioCtx.destination);

                // Map UI Knobs to Core Filter gains
                document.getElementById('eq-60').addEventListener('input', e => filters[0].gain.value = e.target.value);
                document.getElementById('eq-230').addEventListener('input', e => filters[1].gain.value = e.target.value);
                document.getElementById('eq-910').addEventListener('input', e => filters[2].gain.value = e.target.value);
                document.getElementById('eq-4k').addEventListener('input', e => filters[3].gain.value = e.target.value);
                document.getElementById('eq-14k').addEventListener('input', e => filters[4].gain.value = e.target.value);
            };

            // Audio Context must be safely locked behind user interaction
            audio.addEventListener('play', initAudioContext);
        }

        function populatePlaylist(songs) {
            const playlistDom = document.getElementById('playlist-dom');
            playlistDom.innerHTML = '';

            for (const [id, song] of Object.entries(songs)) {
                const li = document.createElement('li');
                li.innerHTML = `&gt; ${song.title.toUpperCase()}`;
                li.onclick = () => {
                    document.querySelectorAll('.song-selector li').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    loadTelemetry(id);
                };
                playlistDom.appendChild(li);
            }
        }

        function loadTelemetry(songId) {
            const song = songCatalog[songId];
            if (!song) return;

            transposeOffset = 0; // Reset offset on new load
            currentRawStructure = song.structure;

            // Trigger dummy fallback audio test streaming line if paths not configured
            const audio = document.getElementById('audio-element');
            audio.src = "show-01/track01.mp3"; 

            renderOutputPane(song);
        }

        function shiftKey(direction) {
            transposeOffset = (transposeOffset + direction + 12) % 12;
            if (currentRawStructure.length > 0) {
                renderUpdatedChords();
            }
        }

        function transposeChord(chordString, offset) {
            return chordString.replace(/[CDEFGAB](#|b)?/g, (match) => {
                let currentIdx = scaleChords.indexOf(match);
                if (currentIdx === -1) {
                    // Normalize down flat conversions for base arrays
                    if (match === "Db") currentIdx = 1;
                    if (match === "Eb") currentIdx = 3;
                    if (match === "Gb") currentIdx = 6;
                    if (match === "Ab") currentIdx = 8;
                    if (match === "Bb") currentIdx = 10;
                }
                if (currentIdx === -1) return match;
                let newIdx = (currentIdx + offset) % 12;
                return scaleChords[newIdx];
            });
        }

        function renderOutputPane(song) {
            const pane = document.getElementById('tab-viewport');
            
            let html = `
                <div class="tab-meta">
                    TRACK_TELEMETRY: ${song.title.toUpperCase()}<br>
                    COMPOSER_MATRIX: LYRICS: ${song.lyrics} / CHORDS: ${song.music}<br>
                    BASE_KEY: ${song.key} ${song.scale}
                </div>
                <div class="rendered-lyrics" id="lyrics-zone"></div>
            `;
            pane.innerHTML = html;
            renderUpdatedChords();
        }

        function renderUpdatedChords() {
            const zone = document.getElementById('lyrics-zone');
            if (!zone) return;

            let finalHtml = '';
            currentRawStructure.forEach(line => {
                let formattedLine = line.replace(/\[(.*?)\]/g, (match, chord) => {
                    let newChord = transposeChord(chord, transposeOffset);
                    return `<span class="chord">${newChord}</span>`;
                });
                finalHtml += `<div class="lyric-line">${formattedLine}</div>`;
            });
            zone.innerHTML = finalHtml;
        }
    </script>
</body>
</html>
